name: 🍽️ Obtener Menú UNRC

on:
  schedule:
    - cron: '59 7 * * 1-5'
    - cron: '30 8 * * 1-5'
    - cron: '0 15 * * 1-5'
  workflow_dispatch:

jobs:
  scrape-menu:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: 🌐 Instalar Playwright y Chromium
        run: |
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64 \
            --no-install-recommends 2>/dev/null || true
          playwright install chromium

      - name: 🤖 Correr el bot
        env:
          UNRC_DNI:      ${{ secrets.UNRC_DNI }}
          UNRC_PASSWORD: ${{ secrets.UNRC_PASSWORD }}
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
        run: |
          cd bot
          python scraper.py

      - name: 📧 Mandar mail con screenshot
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: vanney511@gmail.com
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: "🍽️ Menú UNRC - ${{ github.run_started_at }}"
          to: vanney511@gmail.com
          from: vanney511@gmail.com
          body: "El bot corrió correctamente. Adjunto el screenshot del menú de hoy."
          attachments: bot/menu_*.png

      - name: 📸 Guardar screenshot como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: menu-screenshot
          path: bot/menu_*.png
          retention-days: 7
